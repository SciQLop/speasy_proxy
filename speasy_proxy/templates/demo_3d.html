<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Orbit Viewer - Speasy Proxy</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
    <link rel="stylesheet" href="{{ base_url }}/static/css/theme.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0b0e17;
            color: #e0e6f0;
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .tree-container ul {
            list-style: none;
            padding-left: 16px;
        }

        .tree-container > ul { padding-left: 0; }

        .tree-container li { margin: 1px 0; }

        .tree-node {
            display: flex;
            align-items: center;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.85rem;
            user-select: none;
            white-space: nowrap;
        }

        .tree-node:hover { background: #1a1f36; }

        .tree-node .toggle {
            width: 16px;
            text-align: center;
            margin-right: 4px;
            color: #8892b0;
            font-size: 0.7rem;
        }

        .tree-children { display: none; }

        .tree-children.open { display: block; }

        .tree-node.hidden, li.hidden { display: none; }

        .tree-node input[type="checkbox"] {
            margin-right: 6px;
            accent-color: #6b8afd;
        }

        .tree-node .color-swatch {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 6px;
            flex-shrink: 0;
            display: none;
        }

        .tree-node.plotted .color-swatch { display: inline-block; }

        .tree-node.loading { opacity: 0.5; }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .controls-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: #111627;
            border-bottom: 1px solid #1e2640;
            flex-wrap: wrap;
            overflow: hidden;
            transition: height 0.15s, padding 0.15s;
        }

        .controls-bar select,
        .controls-bar input[type="datetime-local"] {
            padding: 6px 10px;
            border: 1px solid #2a3358;
            border-radius: 6px;
            background: #0b0e17;
            color: #e0e6f0;
            font-size: 0.85rem;
            outline: none;
        }

        .controls-bar select:focus,
        .controls-bar input[type="datetime-local"]:focus {
            border-color: #6b8afd;
        }

        .controls-sep {
            width: 1px;
            height: 24px;
            background: #2a3358;
            flex-shrink: 0;
        }

        .controls-bar input[type="checkbox"] {
            accent-color: #6b8afd;
            margin-right: 4px;
            vertical-align: middle;
        }

        .controls-bar input[type="range"] {
            width: 80px;
            accent-color: #6b8afd;
            vertical-align: middle;
        }

        .controls-value {
            font-size: 0.75rem;
            color: #8892b0;
            min-width: 50px;
        }

        .duration-btns {
            display: flex;
            gap: 4px;
        }

        .duration-btns button {
            padding: 4px 10px;
            border: 1px solid #2a3358;
            border-radius: 4px;
            background: #0b0e17;
            color: #8892b0;
            font-size: 0.78rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .duration-btns button:hover {
            background: #2a3358;
            color: #e0e6f0;
        }

        .duration-btns button.active {
            background: #6b8afd;
            color: #fff;
            border-color: #6b8afd;
        }

        #chart3d { width: 100%; height: 100%; }

        .status-bar {
            padding: 6px 16px;
            background: #111627;
            border-top: 1px solid #1e2640;
            font-size: 0.78rem;
            color: #8892b0;
        }

        ::-webkit-scrollbar { width: 6px; }

        ::-webkit-scrollbar-track { background: transparent; }

        ::-webkit-scrollbar-thumb { background: #2a3358; border-radius: 3px; }

        @media (max-width: 700px) {
            body { flex-direction: column; }

            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                z-index: 100;
                width: 85vw;
                min-width: unset;
                max-width: 360px;
                transition: transform 0.2s;
                transform: translateX(-100%);
            }

            .sidebar.collapsed { width: 85vw; min-width: unset; border-right: 1px solid #1e2640; }
            .sidebar.mobile-open { transform: translateX(0); }

            .sidebar-collapse-btn {
                position: fixed;
                left: 0;
                top: 10px;
                width: 32px;
                height: 32px;
                border-radius: 0 6px 6px 0;
                font-size: 0.9rem;
                z-index: 10;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
                display: none;
            }

            .overlay.visible { display: block; }

            .tree-node {
                padding: 6px 8px;
                font-size: 0.9rem;
            }

            .tree-node .toggle { font-size: 0.8rem; }

            .tree-node input[type="checkbox"] {
                width: 18px;
                height: 18px;
            }

            .controls-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }

            .controls-bar select,
            .controls-bar input[type="datetime-local"] {
                width: 100%;
                padding: 8px;
                font-size: 0.9rem;
            }

            .status-bar { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="{{ base_url }}/" class="back-link">&larr; Home</a>
        <h2>3D Orbit Viewer</h2>
        <input type="text" id="searchInput" placeholder="Search satellites...">
    </div>
    <div class="tree-container" id="treeContainer"></div>
</div>

<button class="sidebar-collapse-btn" id="sidebar-collapse-btn" title="Toggle sidebar">&#9664;</button>

<!-- Main area -->
<div class="main">
    <div class="controls-bar" id="controls-bar">
        <label>Coords</label>
        <select id="coordSys">
            <option value="GSE">GSE</option>
            <option value="GSM">GSM</option>
            <option value="GEO">GEO</option>
            <option value="GM">GM</option>
            <option value="SM">SM</option>
            <option value="GEITOD">GEITOD</option>
            <option value="GEIJ2000">GEIJ2000</option>
        </select>

        <label for="startTime">Start</label>
        <input type="datetime-local" id="startTime">

        <label for="stopTime">Stop</label>
        <input type="datetime-local" id="stopTime">

        <div class="duration-btns" id="durationBtns">
            <button data-days="1">1d</button>
            <button data-days="3">3d</button>
            <button data-days="7" class="active">7d</button>
            <button data-days="30">30d</button>
        </div>

        <span class="controls-sep"></span>

        <label><input type="checkbox" id="showMagnetopause"> Magnetopause</label>
        <label><input type="checkbox" id="showBowShock"> Bow Shock</label>

        <span class="controls-sep"></span>

        <div class="duration-btns" id="viewBtns">
            <button data-view="reset" title="Reset view">Reset</button>
            <button data-view="xy" title="XY plane (top)">XY</button>
            <button data-view="xz" title="XZ plane (front)">XZ</button>
            <button data-view="yz" title="YZ plane (side)">YZ</button>
        </div>

        <span class="controls-sep"></span>

        <label>Dp</label>
        <input type="range" id="dpSlider" min="0.5" max="20" step="0.5" value="2">
        <span class="controls-value" id="dpValue">2.0 nPa</span>

        <label>Bz</label>
        <input type="range" id="bzSlider" min="-20" max="20" step="0.5" value="0">
        <span class="controls-value" id="bzValue">0.0 nT</span>
    </div>
    <button class="controls-collapse-btn" id="controls-collapse-btn" title="Toggle controls">&#9650;</button>

    <div class="chart-wrapper">
        <div class="fetch-bar" id="fetch-bar"></div>
        <div id="chart3d"></div>
        <div class="chart-loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
        </div>
    </div>

    <div class="status-bar" id="statusBar">Ready</div>
</div>

<script>window.SPEASY_BASE_URL = '{{ base_url }}';</script>
<script type="module" src="{{ base_url }}/static/js/demo3d.js"></script>
</body>
</html>
