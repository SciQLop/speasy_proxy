<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Plot - Speasy Proxy</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0b0e17;
            color: #e0e6f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: 320px;
            min-width: 260px;
            background: #111627;
            border-right: 1px solid #1e2640;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #1e2640;
        }

        .sidebar-header .back-link {
            display: inline-block;
            color: #6b8afd;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .sidebar-header .back-link:hover {
            text-decoration: underline;
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sidebar-header input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #2a3358;
            border-radius: 6px;
            background: #0b0e17;
            color: #e0e6f0;
            font-size: 0.9rem;
            outline: none;
        }

        .sidebar-header input[type="text"]:focus {
            border-color: #6b8afd;
        }

        .tree-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .tree-container .loading-text {
            color: #8892b0;
            padding: 12px 0;
        }

        /* ---- Main area ---- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Controls bar */
        .controls-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: #111627;
            border-bottom: 1px solid #1e2640;
            flex-wrap: wrap;
        }

        .controls-bar label {
            font-size: 0.8rem;
            color: #8892b0;
            margin-right: 2px;
        }

        .controls-bar input[type="text"],
        .controls-bar input[type="datetime-local"] {
            padding: 6px 10px;
            border: 1px solid #2a3358;
            border-radius: 6px;
            background: #0b0e17;
            color: #e0e6f0;
            font-size: 0.85rem;
            outline: none;
        }

        .controls-bar input[type="text"] {
            flex: 1;
            min-width: 180px;
        }

        .controls-bar input[type="text"]:focus,
        .controls-bar input[type="datetime-local"]:focus {
            border-color: #6b8afd;
        }

        .controls-bar button {
            padding: 6px 20px;
            border: none;
            border-radius: 6px;
            background: #6b8afd;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .controls-bar button:disabled {
            background: #2a3358;
            color: #555e7e;
            cursor: not-allowed;
        }

        .controls-bar button:not(:disabled):hover {
            background: #5a7bf7;
        }

        /* Chart area */
        .chart-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        .chart-loading-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(11, 14, 23, 0.75);
            z-index: 10;
        }

        .chart-loading-overlay.visible {
            display: flex;
        }

        .chart-loading-overlay .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #2a3358;
            border-top-color: #6b8afd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-bar {
            padding: 4px 16px;
            font-size: 0.75rem;
            color: #555e7e;
            background: #0d1120;
            border-top: 1px solid #1e2640;
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                min-width: unset;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid #1e2640;
            }

            .chart-wrapper {
                min-height: 50vh;
            }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-header">
        <a href="/" class="back-link">&larr; Back to dashboard</a>
        <h2>Products</h2>
        <input type="text" id="search-box" placeholder="Search products...">
    </div>
    <div class="tree-container" id="tree-container">
        <div class="loading-text">Loading inventory...</div>
    </div>
</aside>

<!-- Main area -->
<div class="main">
    <div class="controls-bar">
        <label for="product-path">Product</label>
        <input type="text" id="product-path" readonly placeholder="Select a product from the tree">

        <label for="start-time">Start</label>
        <input type="datetime-local" id="start-time">

        <label for="stop-time">Stop</label>
        <input type="datetime-local" id="stop-time">

        <button id="btn-plot" disabled>Plot</button>
    </div>

    <div class="chart-wrapper">
        <div id="chart"></div>
        <div class="chart-loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
        </div>
    </div>

    <div class="status-bar" id="status-bar">Ready</div>
</div>

</body>
</html>
