<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Plot - Speasy Proxy</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0b0e17;
            color: #e0e6f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: 320px;
            min-width: 260px;
            background: #111627;
            border-right: 1px solid #1e2640;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #1e2640;
        }

        .sidebar-header .back-link {
            display: inline-block;
            color: #6b8afd;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .sidebar-header .back-link:hover {
            text-decoration: underline;
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .sidebar-header input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #2a3358;
            border-radius: 6px;
            background: #0b0e17;
            color: #e0e6f0;
            font-size: 0.9rem;
            outline: none;
        }

        .sidebar-header input[type="text"]:focus {
            border-color: #6b8afd;
        }

        .tree-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .tree-container .loading-text {
            color: #8892b0;
            padding: 12px 0;
        }

        /* ---- Main area ---- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Controls bar */
        .controls-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: #111627;
            border-bottom: 1px solid #1e2640;
            flex-wrap: wrap;
        }

        .controls-bar label {
            font-size: 0.8rem;
            color: #8892b0;
            margin-right: 2px;
        }

        .controls-bar input[type="text"],
        .controls-bar input[type="datetime-local"] {
            padding: 6px 10px;
            border: 1px solid #2a3358;
            border-radius: 6px;
            background: #0b0e17;
            color: #e0e6f0;
            font-size: 0.85rem;
            outline: none;
        }

        .controls-bar input[type="text"] {
            flex: 1;
            min-width: 180px;
        }

        .controls-bar input[type="text"]:focus,
        .controls-bar input[type="datetime-local"]:focus {
            border-color: #6b8afd;
        }

        .controls-bar button {
            padding: 6px 20px;
            border: none;
            border-radius: 6px;
            background: #6b8afd;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .controls-bar button:disabled {
            background: #2a3358;
            color: #555e7e;
            cursor: not-allowed;
        }

        .controls-bar button:not(:disabled):hover {
            background: #5a7bf7;
        }

        /* Chart area */
        .chart-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #chart {
            width: 100%;
            height: 100%;
        }

        .chart-loading-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(11, 14, 23, 0.75);
            z-index: 10;
        }

        .chart-loading-overlay.visible {
            display: flex;
        }

        .chart-loading-overlay .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #2a3358;
            border-top-color: #6b8afd;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-bar {
            padding: 4px 16px;
            font-size: 0.75rem;
            color: #555e7e;
            background: #0d1120;
            border-top: 1px solid #1e2640;
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                min-width: unset;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid #1e2640;
            }

            .chart-wrapper {
                min-height: 50vh;
            }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-header">
        <a href="/" class="back-link">&larr; Back to dashboard</a>
        <h2>Products</h2>
        <input type="text" id="search-box" placeholder="Search products...">
    </div>
    <div class="tree-container" id="tree-container">
        <div class="loading-text">Loading inventory...</div>
    </div>
</aside>

<!-- Main area -->
<div class="main">
    <div class="controls-bar">
        <label for="product-path">Product</label>
        <input type="text" id="product-path" readonly placeholder="Select a product from the tree">

        <label for="start-time">Start</label>
        <input type="datetime-local" id="start-time">

        <label for="stop-time">Stop</label>
        <input type="datetime-local" id="stop-time">

        <button id="btn-plot" disabled>Plot</button>
        <button id="btn-log-scale" style="display:none;" title="Toggle log/linear color scale">Log</button>
    </div>

    <div class="chart-wrapper">
        <div id="chart"></div>
        <div class="chart-loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
        </div>
    </div>

    <div class="status-bar" id="status-bar">Ready</div>
</div>

<script>
    const BASE_URL = '{{ base_url }}';
    const API_BASE = BASE_URL + '/';
    const MAX_CACHE_POINTS = 500000;
    const SKIP_KEYS = new Set([
        '__spz_name__', '__spz_provider__', '__spz_type__', '__spz_uid__',
        'build_date', 'Catalogs', 'TimeTables',
        'start_date', 'stop_date', 'dt', 'sampling_time',
        'is_public', 'description', 'units', 'display_type',
        'n_components', 'dataset', 'process_id',
        'FIELDNAM', 'CATDESC', 'LABLAXIS', 'UNITS', 'VALIDMIN', 'VALIDMAX',
        'SCALEMIN', 'SCALEMAX', 'SCALETYP', 'FILLVAL', 'SI_CONVERSION',
        'COORDINATE_SYSTEM', 'TENSOR_ORDER', 'SIZES', 'DEPEND_1',
        'LABL_PTR_1', 'LABL_PTR_2', 'COMPONENT_0', 'COMPONENT_1',
        'COMPONENT_2', 'QUALITY', 'spaseId', 'dataSource'
    ]);
    const CHART_COLORS = [
        '#5470c6','#91cc75','#fac858','#ee6666','#73c0de',
        '#3ba272','#fc8452','#9a60b4','#ea7ccc'
    ];

    // State
    let chart = null;
    let inventory = null;
    let selectedProduct = null;
    let cachedData = null;
    let leafIndex = [];
    let zoomDebounceTimer = null;
    let plotType = 'line'; // 'line' or 'heatmap'
    let logScale = true;   // log color scale for heatmaps

    // ===== Helpers =====

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    function toLocalISOString(date) {
        const pad = (n) => String(n).padStart(2, '0');
        return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' +
               pad(date.getDate()) + 'T' + pad(date.getHours()) + ':' +
               pad(date.getMinutes()) + ':' + pad(date.getSeconds());
    }

    function getDisplayName(node, key) {
        return (node && (node.__spz_name__ || node.name)) || key;
    }

    function getProductPath(node) {
        return node.__spz_provider__ + '/' + node.__spz_uid__;
    }

    function showLoading(visible) {
        const overlay = document.getElementById('loading-overlay');
        if (visible) {
            overlay.classList.add('visible');
        } else {
            overlay.classList.remove('visible');
        }
    }

    function setStatus(msg) {
        document.getElementById('status-bar').textContent = msg;
    }

    function shouldSkipNode(node) {
        if (!node || typeof node !== 'object') return true;
        const t = node.__spz_type__ || '';
        if (t.indexOf('Catalog') !== -1 || t.indexOf('TimeTable') !== -1) return true;
        return false;
    }

    // ===== Task 4: Inventory Tree =====

    async function loadInventory() {
        try {
            const resp = await fetch(API_BASE + 'get_inventory?format=json&provider=all');
            inventory = JSON.parse(await resp.text());
            renderTree(inventory);
            setupSearch();
        } catch (e) {
            document.getElementById('tree-container').innerHTML =
                '<div class="loading-text">Failed to load inventory.</div>';
            console.error('Inventory load error:', e);
        }
    }

    function renderTree(data) {
        const container = document.getElementById('tree-container');
        container.innerHTML = '';
        if (!data || typeof data !== 'object') return;
        const keys = Object.keys(data).filter(k => !SKIP_KEYS.has(k)).sort();
        for (const key of keys) {
            if (shouldSkipNode(data[key])) continue;
            const node = buildTreeNode(data[key], key);
            if (node) container.appendChild(node);
        }
    }

    function buildTreeNode(data, key) {
        if (!data || typeof data !== 'object') return null;
        if (shouldSkipNode(data)) return null;

        const displayName = getDisplayName(data, key);

        // Leaf node
        if (data.__spz_type__ === 'ParameterIndex') {
            const div = document.createElement('div');
            div.style.cssText = 'padding:3px 0 3px 8px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:4px;';
            div.textContent = displayName;
            div.title = getProductPath(data);
            div.addEventListener('mouseenter', () => { div.style.background = '#1e2640'; });
            div.addEventListener('mouseleave', () => {
                if (!div.classList.contains('selected')) div.style.background = '';
            });
            div.addEventListener('click', () => selectProduct(data, div));
            return div;
        }

        // Branch node — collect children first
        const childKeys = Object.keys(data).filter(k => !SKIP_KEYS.has(k)).sort();
        const childNodes = [];
        for (const ck of childKeys) {
            if (typeof data[ck] !== 'object' || data[ck] === null) continue;
            if (shouldSkipNode(data[ck])) continue;
            const child = buildTreeNode(data[ck], ck);
            if (child) childNodes.push(child);
        }
        if (childNodes.length === 0) return null;

        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'margin-left:4px;';

        const header = document.createElement('div');
        header.style.cssText = 'padding:3px 0;cursor:pointer;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
        const arrow = document.createElement('span');
        arrow.textContent = '\u25B6 ';
        arrow.style.cssText = 'font-size:0.7em;display:inline-block;transition:transform 0.15s;color:#555e7e;';
        header.appendChild(arrow);
        header.appendChild(document.createTextNode(displayName));

        const childContainer = document.createElement('div');
        childContainer.style.cssText = 'display:none;margin-left:12px;';
        for (const cn of childNodes) childContainer.appendChild(cn);

        header.addEventListener('click', () => {
            const open = childContainer.style.display !== 'none';
            childContainer.style.display = open ? 'none' : 'block';
            arrow.style.transform = open ? '' : 'rotate(90deg)';
        });

        wrapper.appendChild(header);
        wrapper.appendChild(childContainer);
        return wrapper;
    }

    let previousSelectedLabel = null;

    function selectProduct(node, labelEl) {
        // Un-highlight previous
        if (previousSelectedLabel) {
            previousSelectedLabel.classList.remove('selected');
            previousSelectedLabel.style.background = '';
        }
        // Highlight new
        labelEl.classList.add('selected');
        labelEl.style.background = '#1e2640';
        previousSelectedLabel = labelEl;

        selectedProduct = getProductPath(node);
        document.getElementById('product-path').value = selectedProduct;
        document.getElementById('btn-plot').disabled = false;

        // Pre-fill date inputs
        if (node.stop_date) {
            const stopDate = new Date(node.stop_date);
            const startDate = new Date(stopDate.getTime() - 2 * 3600 * 1000);
            document.getElementById('stop-time').value = toLocalISOString(stopDate);
            document.getElementById('start-time').value = toLocalISOString(startDate);
        }

        updateURL();
    }

    // ===== Task 5: Search/Filter =====

    function setupSearch() {
        leafIndex = [];
        buildLeafIndex(inventory, []);

        document.getElementById('search-box').addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            if (query.length < 2) {
                renderTree(inventory);
                return;
            }
            renderSearchResults(query);
        });
    }

    function buildLeafIndex(node, breadcrumb) {
        if (!node || typeof node !== 'object') return;
        if (shouldSkipNode(node)) return;

        if (node.__spz_type__ === 'ParameterIndex') {
            const displayName = node.__spz_name__ || node.name || '';
            const bc = breadcrumb.concat(displayName);
            leafIndex.push({
                name: bc.join(' / ').toLowerCase(),
                displayName: displayName,
                breadcrumb: bc,
                node: node,
                path: getProductPath(node)
            });
            return;
        }

        const keys = Object.keys(node).filter(k => !SKIP_KEYS.has(k));
        for (const k of keys) {
            if (typeof node[k] === 'object' && node[k] !== null) {
                buildLeafIndex(node[k], breadcrumb.concat(getDisplayName(node[k], k)));
            }
        }
    }

    function renderSearchResults(query) {
        const container = document.getElementById('tree-container');
        container.innerHTML = '';

        const terms = query.split(/\s+/).filter(t => t.length > 0);
        const results = leafIndex.filter(leaf => {
            return terms.every(t => leaf.name.indexOf(t) !== -1);
        });

        if (results.length === 0) {
            container.innerHTML = '<div class="loading-text">No results found.</div>';
            return;
        }

        const max = Math.min(results.length, 100);
        for (let i = 0; i < max; i++) {
            const leaf = results[i];
            const div = document.createElement('div');
            div.style.cssText = 'padding:4px 4px;cursor:pointer;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';

            const prefix = leaf.breadcrumb.slice(0, -1).join(' / ');
            if (prefix) {
                const span = document.createElement('span');
                span.style.color = '#555e7e';
                span.textContent = prefix + ' / ';
                div.appendChild(span);
            }
            div.appendChild(document.createTextNode(leaf.displayName));
            div.title = leaf.path;

            div.addEventListener('mouseenter', () => { div.style.background = '#1e2640'; });
            div.addEventListener('mouseleave', () => {
                if (!div.classList.contains('selected')) div.style.background = '';
            });
            div.addEventListener('click', () => selectProduct(leaf.node, div));
            container.appendChild(div);
        }

        if (results.length > 100) {
            const more = document.createElement('div');
            more.className = 'loading-text';
            more.textContent = '... and ' + (results.length - 100) + ' more results';
            container.appendChild(more);
        }
    }

    // ===== Task 6: Data Fetch and ECharts Plot =====

    function initChart() {
        chart = echarts.init(document.getElementById('chart'), 'dark');
        window.addEventListener('resize', () => { chart.resize(); });
    }

    function bindControls() {
        document.getElementById('btn-plot').addEventListener('click', doPlot);
        document.getElementById('start-time').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doPlot();
        });
        document.getElementById('stop-time').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doPlot();
        });
        document.getElementById('btn-log-scale').addEventListener('click', () => {
            logScale = !logScale;
            document.getElementById('btn-log-scale').textContent = logScale ? 'Log' : 'Linear';
            if (cachedData && cachedData.times.length > 0 && plotType === 'heatmap') {
                renderHeatmap();
            }
        });
    }

    async function doPlot() {
        const product = document.getElementById('product-path').value;
        const startTime = document.getElementById('start-time').value;
        const stopTime = document.getElementById('stop-time').value;

        if (!product) { setStatus('No product selected.'); return; }
        if (!startTime || !stopTime) { setStatus('Please set start and stop times.'); return; }

        selectedProduct = product;
        cachedData = {
            product: product,
            intervals: [],
            times: [],
            columns: {},
            columnNames: [],
            unit: '',
            // Spectrogram fields
            yAxis: null,       // array of Y-axis bin values (e.g. energy channels)
            yAxisName: '',
            yAxisUnit: '',
            rows: [],          // raw 2D array: rows[timeIdx] = [val_per_ybin]
            displayType: ''
        };

        updateURL();
        await fetchAndPlot(startTime, stopTime);
    }

    async function fetchAndPlot(startTime, stopTime) {
        showLoading(true);
        setStatus('Fetching data...');
        try {
            const data = await fetchData(selectedProduct, startTime, stopTime);
            if (!data || !data.values || !data.axes || data.axes.length === 0) {
                setStatus('No data returned.');
                showLoading(false);
                return;
            }
            mergeData(data, new Date(startTime).getTime(), new Date(stopTime).getTime());
            renderChart();
            const totalPoints = cachedData.times.length * cachedData.columnNames.length;
            setStatus('Loaded ' + cachedData.times.length + ' timestamps, ' +
                       cachedData.columnNames.length + ' columns (' + totalPoints + ' points)');
        } catch (e) {
            setStatus('Error: ' + e.message);
            console.error(e);
        } finally {
            showLoading(false);
        }
    }

    async function fetchData(product, startTime, stopTime) {
        const startISO = new Date(startTime).toISOString();
        const stopISO = new Date(stopTime).toISOString();
        const url = API_BASE + 'get_data?format=json&path=' +
                    encodeURIComponent(product) +
                    '&start_time=' + encodeURIComponent(startISO) +
                    '&stop_time=' + encodeURIComponent(stopISO);
        const resp = await fetch(url);
        const text = await resp.text();
        // Replace NaN with null before parsing
        const sanitized = text.replace(/\bNaN\b/g, 'null');
        return JSON.parse(sanitized);
    }

    function detectPlotType(json) {
        const meta = json.values.meta || {};
        const displayType = (meta.DISPLAY_TYPE || '').toLowerCase();
        const numCols = json.values.values.length > 0 ? json.values.values[0].length : 0;
        if (displayType === 'spectrogram' || (numCols > 10 && json.axes.length >= 2)) {
            return 'heatmap';
        }
        return 'line';
    }

    function mergeData(json, fetchStart, fetchStop) {
        const rawTimes = json.axes[0].values;
        const newTimes = rawTimes.map(t => t / 1e6); // nanoseconds to milliseconds
        const newValues = json.values.values; // 2D array
        const columns = json.columns || [];
        const unit = (json.values.meta && json.values.meta.UNITS) || '';

        if (cachedData.times.length === 0) {
            // First load — detect plot type
            plotType = detectPlotType(json);
            cachedData.displayType = (json.values.meta || {}).DISPLAY_TYPE || '';
            cachedData.times = newTimes;
            cachedData.unit = unit;
            cachedData.intervals = [[fetchStart, fetchStop]];

            if (plotType === 'heatmap') {
                // Store Y-axis bins and raw 2D rows
                if (json.axes.length >= 2) {
                    cachedData.yAxis = json.axes[1].values;
                    cachedData.yAxisName = json.axes[1].name || '';
                    cachedData.yAxisUnit = (json.axes[1].meta && json.axes[1].meta.UNITS) || '';
                } else {
                    cachedData.yAxis = newValues[0] ? newValues[0].map((_, i) => i) : [];
                }
                cachedData.rows = newValues;
                cachedData.columnNames = columns;
                // Show log/linear toggle
                document.getElementById('btn-log-scale').style.display = '';
            } else {
                cachedData.columnNames = columns.length > 0 ? columns :
                    (newValues[0] ? newValues[0].map((_, i) => 'col_' + i) : ['value']);
                for (let c = 0; c < cachedData.columnNames.length; c++) {
                    cachedData.columns[cachedData.columnNames[c]] = newValues.map(row => row[c]);
                }
                // Hide log/linear toggle
                document.getElementById('btn-log-scale').style.display = 'none';
            }
        } else {
            if (plotType === 'heatmap') {
                // Merge spectrogram rows
                const merged = mergeSortedRows(cachedData.times, newTimes, cachedData.rows, newValues);
                cachedData.times = merged.times;
                cachedData.rows = merged.rows;
            } else {
                const merged = mergeSorted(cachedData.times, newTimes, cachedData.columns, newValues, cachedData.columnNames);
                cachedData.times = merged.times;
                cachedData.columns = merged.columns;
            }
            cachedData.intervals = mergeIntervals(cachedData.intervals.concat([[fetchStart, fetchStop]]));
        }
    }

    function mergeSortedRows(oldTimes, newTimes, oldRows, newRows) {
        const resultTimes = [];
        const resultRows = [];
        let i = 0, j = 0;
        while (i < oldTimes.length && j < newTimes.length) {
            if (oldTimes[i] < newTimes[j]) {
                resultTimes.push(oldTimes[i]);
                resultRows.push(oldRows[i]);
                i++;
            } else if (oldTimes[i] > newTimes[j]) {
                resultTimes.push(newTimes[j]);
                resultRows.push(newRows[j]);
                j++;
            } else {
                resultTimes.push(newTimes[j]);
                resultRows.push(newRows[j]);
                i++; j++;
            }
        }
        while (i < oldTimes.length) { resultTimes.push(oldTimes[i]); resultRows.push(oldRows[i]); i++; }
        while (j < newTimes.length) { resultTimes.push(newTimes[j]); resultRows.push(newRows[j]); j++; }
        return { times: resultTimes, rows: resultRows };
    }

    function mergeSorted(oldTimes, newTimes, oldColumns, newValues, columnNames) {
        const resultTimes = [];
        const resultColumns = {};
        for (const cn of columnNames) resultColumns[cn] = [];

        let i = 0, j = 0;
        while (i < oldTimes.length && j < newTimes.length) {
            if (oldTimes[i] < newTimes[j]) {
                resultTimes.push(oldTimes[i]);
                for (const cn of columnNames) resultColumns[cn].push(oldColumns[cn][i]);
                i++;
            } else if (oldTimes[i] > newTimes[j]) {
                resultTimes.push(newTimes[j]);
                for (let c = 0; c < columnNames.length; c++) {
                    resultColumns[columnNames[c]].push(newValues[j][c]);
                }
                j++;
            } else {
                // Duplicate — keep new
                resultTimes.push(newTimes[j]);
                for (let c = 0; c < columnNames.length; c++) {
                    resultColumns[columnNames[c]].push(newValues[j][c]);
                }
                i++;
                j++;
            }
        }
        while (i < oldTimes.length) {
            resultTimes.push(oldTimes[i]);
            for (const cn of columnNames) resultColumns[cn].push(oldColumns[cn][i]);
            i++;
        }
        while (j < newTimes.length) {
            resultTimes.push(newTimes[j]);
            for (let c = 0; c < columnNames.length; c++) {
                resultColumns[columnNames[c]].push(newValues[j][c]);
            }
            j++;
        }
        return { times: resultTimes, columns: resultColumns };
    }

    function mergeIntervals(intervals) {
        if (intervals.length === 0) return [];
        intervals.sort((a, b) => a[0] - b[0]);
        const merged = [intervals[0].slice()];
        for (let i = 1; i < intervals.length; i++) {
            const last = merged[merged.length - 1];
            if (intervals[i][0] <= last[1]) {
                last[1] = Math.max(last[1], intervals[i][1]);
            } else {
                merged.push(intervals[i].slice());
            }
        }
        return merged;
    }

    function buildSeriesData(times, values) {
        const data = new Array(times.length);
        for (let i = 0; i < times.length; i++) {
            data[i] = [times[i], values[i]];
        }
        return data;
    }

    function renderChart() {
        if (plotType === 'heatmap') {
            renderHeatmap();
        } else {
            renderLineChart();
        }
    }

    function renderLineChart() {
        const times = cachedData.times;
        const columnNames = cachedData.columnNames;

        const series = [];
        for (let c = 0; c < columnNames.length; c++) {
            const colName = columnNames[c];
            const vals = cachedData.columns[colName];
            series.push({
                name: colName,
                type: 'line',
                showSymbol: false,
                lineStyle: { width: 1.2 },
                color: CHART_COLORS[c % CHART_COLORS.length],
                data: buildSeriesData(times, vals),
                sampling: 'lttb',
                large: true,
                largeThreshold: 5000
            });
        }

        const option = {
            backgroundColor: 'transparent',
            animation: false,
            legend: {
                type: 'scroll',
                top: 5,
                textStyle: { color: '#e0e6f0' }
            },
            tooltip: {
                trigger: 'axis',
                backgroundColor: '#1a1f36',
                borderColor: '#2a3358',
                textStyle: { color: '#e0e6f0', fontSize: 12 },
                formatter: function(params) {
                    if (!params || params.length === 0) return '';
                    const time = new Date(params[0].value[0]).toISOString().replace('T', ' ').replace('Z', '');
                    let html = '<b>' + escapeHtml(time) + '</b><br>';
                    for (const p of params) {
                        const val = p.value[1];
                        const valStr = val === null ? 'NaN' : (typeof val === 'number' ? val.toPrecision(6) : val);
                        html += '<span style="color:' + p.color + '">\u25CF</span> ' +
                                escapeHtml(p.seriesName) + ': ' + valStr + '<br>';
                    }
                    return html;
                }
            },
            xAxis: {
                type: 'time',
                min: times[0] - (times[times.length-1] - times[0]) * 2,
                max: times[times.length-1] + (times[times.length-1] - times[0]) * 2,
                axisLabel: { color: '#8892b0' },
                axisLine: { lineStyle: { color: '#2a3358' } },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                name: cachedData.unit,
                nameTextStyle: { color: '#8892b0' },
                axisLabel: { color: '#8892b0' },
                axisLine: { lineStyle: { color: '#2a3358' } },
                splitLine: { lineStyle: { color: '#1e2640' } }
            },
            visualMap: null,
            dataZoom: makeDataZoom(times[0], times[times.length - 1]),
            grid: { left: 60, right: 20, top: 40, bottom: 50, containLabel: false },
            series: series
        };

        chart.setOption(option, true);
        currentView.start = times[0];
        currentView.end = times[times.length - 1];
        setupZoomHandler();
    }

    function renderHeatmap() {
        const times = cachedData.times;
        const yBins = cachedData.yAxis;
        const rows = cachedData.rows;

        // Build heatmap data: [xIndex, yIndex, value]
        // Compute time step for cell width
        const heatData = [];
        let vMin = Infinity, vMax = -Infinity;
        for (let t = 0; t < times.length; t++) {
            for (let y = 0; y < yBins.length; y++) {
                let val = rows[t] ? rows[t][y] : null;
                if (val === null || val === undefined || isNaN(val) || val <= 0) {
                    heatData.push([times[t], yBins[y], null]);
                } else {
                    heatData.push([times[t], yBins[y], val]);
                    if (val < vMin) vMin = val;
                    if (val > vMax) vMax = val;
                }
            }
        }

        if (vMin === Infinity) vMin = 0;
        if (vMax === -Infinity) vMax = 1;
        // Avoid zero range
        if (vMin === vMax) { vMax = vMin + 1; }

        const yLabel = cachedData.yAxisName +
            (cachedData.yAxisUnit ? ' (' + cachedData.yAxisUnit + ')' : '');

        const option = {
            backgroundColor: 'transparent',
            animation: false,
            tooltip: {
                backgroundColor: '#1a1f36',
                borderColor: '#2a3358',
                textStyle: { color: '#e0e6f0', fontSize: 12 },
                formatter: function(params) {
                    if (!params || !params.value) return '';
                    const time = new Date(params.value[0]).toISOString().replace('T', ' ').replace('Z', '');
                    const yVal = params.value[1];
                    const zVal = params.value[2];
                    return '<b>' + escapeHtml(time) + '</b><br>' +
                           yLabel + ': ' + (yVal != null ? yVal : 'N/A') + '<br>' +
                           'Value: ' + (zVal != null ? zVal.toExponential(3) : 'NaN');
                }
            },
            legend: null,
            xAxis: {
                type: 'time',
                min: times[0] - (times[times.length-1] - times[0]) * 2,
                max: times[times.length-1] + (times[times.length-1] - times[0]) * 2,
                axisLabel: { color: '#8892b0' },
                axisLine: { lineStyle: { color: '#2a3358' } },
                splitLine: { show: false }
            },
            yAxis: {
                type: 'value',
                name: yLabel,
                nameTextStyle: { color: '#8892b0' },
                axisLabel: { color: '#8892b0' },
                axisLine: { lineStyle: { color: '#2a3358' } },
                splitLine: { show: false }
            },
            visualMap: {
                min: logScale ? Math.log10(Math.max(vMin, 1e-30)) : vMin,
                max: logScale ? Math.log10(vMax) : vMax,
                calculable: true,
                orient: 'vertical',
                right: 10,
                top: 40,
                bottom: 60,
                textStyle: { color: '#8892b0' },
                inRange: {
                    color: ['#440154','#482878','#3e4989','#31688e','#26828e',
                            '#1f9e89','#35b779','#6ece58','#b5de2b','#fde725']
                },
                formatter: function(val) {
                    if (logScale) return (Math.pow(10, val)).toExponential(1);
                    return val.toExponential(1);
                }
            },
            dataZoom: makeDataZoom(times[0], times[times.length - 1]),
            grid: { left: 60, right: 100, top: 20, bottom: 50, containLabel: false },
            series: [{
                type: 'heatmap',
                data: heatData.map(function(d) {
                    if (d[2] === null) return [d[0], d[1], null];
                    return [d[0], d[1], logScale ? Math.log10(Math.max(d[2], 1e-30)) : d[2]];
                }),
                progressive: 5000,
                emphasis: { itemStyle: { borderColor: '#fff', borderWidth: 1 } }
            }]
        };

        chart.setOption(option, true);
        currentView.start = times[0];
        currentView.end = times[times.length - 1];
        setupZoomHandler();
    }

    function makeDataZoom(startVal, endVal) {
        return [
            {
                type: 'inside',
                xAxisIndex: 0,
                filterMode: 'none',
                zoomOnMouseWheel: 'ctrl',
                moveOnMouseWheel: true,
                moveOnMouseMove: true,
                preventDefaultMouseMove: true,
                startValue: startVal,
                endValue: endVal
            },
            {
                type: 'slider',
                xAxisIndex: 0,
                bottom: 8,
                height: 20,
                borderColor: '#2a3358',
                backgroundColor: '#111627',
                fillerColor: 'rgba(107,138,253,0.15)',
                handleStyle: { color: '#6b8afd' },
                textStyle: { color: '#8892b0' },
                filterMode: 'none',
                startValue: startVal,
                endValue: endVal
            }
        ];
    }

    // ===== Continuous Pan/Zoom =====
    //
    // Strategy: track the visible time window explicitly (not via dataZoom %).
    // On every zoom/pan, ensure we have data covering visible range + 1x buffer
    // on each side. The xAxis min/max is set wider than the data so the user
    // can always pan further without hitting a wall.

    let currentView = { start: null, end: null }; // millisecond timestamps
    let isFetching = false;
    const BUFFER_RATIO = 1.0; // pre-fetch 1x view width on each side

    function getVisibleRange() {
        // Read the actual axis extent from the chart — most reliable source
        const option = chart.getOption();
        if (!option || !option.dataZoom || option.dataZoom.length === 0) return null;
        const dz = option.dataZoom[0];

        // If startValue/endValue are set, use them directly
        if (dz.startValue != null && dz.endValue != null) {
            return { start: dz.startValue, end: dz.endValue };
        }

        // Fallback: compute from percentages relative to xAxis min/max
        const xAxis = option.xAxis[0];
        const axisMin = xAxis.min;
        const axisMax = xAxis.max;
        if (axisMin != null && axisMax != null && dz.start != null && dz.end != null) {
            const range = axisMax - axisMin;
            return {
                start: axisMin + range * (dz.start / 100),
                end: axisMin + range * (dz.end / 100)
            };
        }
        return null;
    }

    function setupZoomHandler() {
        chart.off('datazoom');
        chart.on('datazoom', () => {
            if (zoomDebounceTimer) clearTimeout(zoomDebounceTimer);
            zoomDebounceTimer = setTimeout(onZoomPan, 200);
        });
    }

    async function onZoomPan() {
        if (!cachedData || cachedData.times.length === 0) return;
        if (isFetching) return;

        const view = getVisibleRange();
        if (!view) return;
        currentView.start = view.start;
        currentView.end = view.end;

        const viewStart = currentView.start;
        const viewEnd = currentView.end;
        const viewRange = viewEnd - viewStart;
        const buffer = viewRange * BUFFER_RATIO;

        // We want data covering [viewStart - buffer, viewEnd + buffer]
        const fetchStart = viewStart - buffer;
        const fetchEnd = viewEnd + buffer;

        const gaps = computeGaps(fetchStart, fetchEnd, cachedData.intervals);
        if (gaps.length === 0) return;

        isFetching = true;
        showLoading(true);

        let fetched = false;
        for (const gap of gaps) {
            setStatus('Fetching: ' + new Date(gap[0]).toISOString().slice(0,19) +
                       ' to ' + new Date(gap[1]).toISOString().slice(0,19));
            try {
                const data = await fetchData(selectedProduct,
                    new Date(gap[0]).toISOString(), new Date(gap[1]).toISOString());
                if (data && data.values && data.axes && data.axes.length > 0 &&
                    data.axes[0].values.length > 0) {
                    mergeData(data, gap[0], gap[1]);
                    fetched = true;
                } else {
                    // No data in this range — mark it as covered anyway to avoid re-fetching
                    cachedData.intervals = mergeIntervals(
                        cachedData.intervals.concat([[gap[0], gap[1]]]));
                }
            } catch (e) {
                console.error('Gap fetch error:', e);
            }
        }

        if (fetched) {
            evictCache();
            updateChartData(viewStart, viewEnd);
        }

        showLoading(false);
        setStatus('Loaded ' + cachedData.times.length + ' timestamps, ' +
                   cachedData.columnNames.length + ' columns');
        isFetching = false;
    }

    function updateChartData(viewStart, viewEnd) {
        const times = cachedData.times;
        const viewRange = viewEnd - viewStart;
        const axisBuffer = viewRange * 3;

        // Never shrink the axis range — only expand
        const option = chart.getOption();
        const curMin = option.xAxis[0].min;
        const curMax = option.xAxis[0].max;
        const newMin = Math.min(curMin != null ? curMin : Infinity, times[0] - axisBuffer, viewStart - axisBuffer);
        const newMax = Math.max(curMax != null ? curMax : -Infinity, times[times.length - 1] + axisBuffer, viewEnd + axisBuffer);

        let series;
        if (plotType === 'heatmap') {
            const yBins = cachedData.yAxis;
            const rows = cachedData.rows;
            const heatData = [];
            for (let t = 0; t < times.length; t++) {
                for (let y = 0; y < yBins.length; y++) {
                    let val = rows[t] ? rows[t][y] : null;
                    if (val === null || val === undefined || isNaN(val) || val <= 0) {
                        heatData.push([times[t], yBins[y], null]);
                    } else {
                        heatData.push([times[t], yBins[y], logScale ? Math.log10(Math.max(val, 1e-30)) : val]);
                    }
                }
            }
            series = [{ type: 'heatmap', data: heatData, progressive: 5000 }];
        } else {
            series = [];
            for (let c = 0; c < cachedData.columnNames.length; c++) {
                const colName = cachedData.columnNames[c];
                series.push({
                    name: colName,
                    type: 'line',
                    showSymbol: false,
                    lineStyle: { width: 1.2 },
                    color: CHART_COLORS[c % CHART_COLORS.length],
                    data: buildSeriesData(times, cachedData.columns[colName]),
                    sampling: 'lttb',
                    large: true,
                    largeThreshold: 5000
                });
            }
        }

        chart.setOption({
            xAxis: { min: newMin, max: newMax },
            dataZoom: [
                { type: 'inside', startValue: viewStart, endValue: viewEnd },
                { type: 'slider', startValue: viewStart, endValue: viewEnd }
            ],
            series: series
        });
    }

    function computeGaps(viewStart, viewEnd, intervals) {
        const gaps = [];
        let cursor = viewStart;
        for (const iv of intervals) {
            if (iv[1] <= cursor) continue;
            if (iv[0] > viewEnd) break;
            if (iv[0] > cursor) {
                gaps.push([cursor, Math.min(iv[0], viewEnd)]);
            }
            cursor = Math.max(cursor, iv[1]);
        }
        if (cursor < viewEnd) {
            gaps.push([cursor, viewEnd]);
        }
        return gaps;
    }

    function evictCache() {
        if (cachedData.times.length <= MAX_CACHE_POINTS) return;
        const excess = cachedData.times.length - MAX_CACHE_POINTS;
        cachedData.times = cachedData.times.slice(excess);
        if (plotType === 'heatmap') {
            cachedData.rows = cachedData.rows.slice(excess);
        } else {
            for (const cn of cachedData.columnNames) {
                cachedData.columns[cn] = cachedData.columns[cn].slice(excess);
            }
        }
        if (cachedData.times.length > 0) {
            const newStart = cachedData.times[0];
            cachedData.intervals = cachedData.intervals
                .map(iv => [Math.max(iv[0], newStart), iv[1]])
                .filter(iv => iv[1] > iv[0]);
        }
    }

    // ===== Task 8: URL State =====

    function updateURL() {
        const params = new URLSearchParams(window.location.search);
        const product = document.getElementById('product-path').value;
        const startTime = document.getElementById('start-time').value;
        const stopTime = document.getElementById('stop-time').value;

        if (product) params.set('path', product); else params.delete('path');
        if (startTime) params.set('start', startTime); else params.delete('start');
        if (stopTime) params.set('stop', stopTime); else params.delete('stop');

        const newUrl = window.location.pathname + '?' + params.toString();
        history.replaceState(null, '', newUrl);
    }

    function loadFromURLParams() {
        const params = new URLSearchParams(window.location.search);
        const path = params.get('path');
        const start = params.get('start');
        const stop = params.get('stop');

        if (path) {
            document.getElementById('product-path').value = path;
            selectedProduct = path;
            document.getElementById('btn-plot').disabled = false;
        }
        if (start) document.getElementById('start-time').value = start;
        if (stop) document.getElementById('stop-time').value = stop;

        if (path && start && stop) {
            setTimeout(() => doPlot(), 100);
        }
    }

    // ===== Init =====

    document.addEventListener('DOMContentLoaded', () => {
        initChart();
        loadInventory();
        bindControls();
        loadFromURLParams();
    });
</script>
